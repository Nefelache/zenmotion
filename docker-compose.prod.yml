# ==========================================================================
# ZenMotion — PRODUCTION/TEST deployment behind an EXISTING Caddy proxy.
#
# Use this on the server that already runs Caddy (ports 80/443) + other apps.
# It publishes NOTHING on the host: the frontend joins Caddy's network and
# Caddy reverse-proxies a subdomain to it. The backend stays internal.
#
#   1) cp zenmotion_backed/.env.example zenmotion_backed/.env  (edit secrets;
#      set FRONTEND_BASE_URL=https://zenmotion.osliceinspiration.com)
#   2) Set the external network name to YOUR Caddy network, e.g.:
#        export CADDY_NETWORK=agent-os_default
#      (find it with: docker inspect agent-os-caddy-1 \
#         --format '{{json .NetworkSettings.Networks}}')
#   3) docker compose -f docker-compose.prod.yml up -d --build
#   4) Add the Caddy site block (see deploy/Caddyfile.snippet) and reload Caddy.
# ==========================================================================

services:
  backend:
    build:
      context: ./zenmotion_backed
    image: zenmotion-backend:latest
    container_name: zenmotion-backend
    restart: unless-stopped
    env_file:
      - ./zenmotion_backed/.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_FILE: data/zenmotion.db
    volumes:
      - backend_data:/app/data
    networks:
      - zenmotion_internal
    # No host ports. Reachable only inside the compose network as "backend:4000".

  frontend:
    image: nginx:1.27-alpine
    container_name: zenmotion-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./zenmotion_front:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - zenmotion_internal   # talk to backend
      - caddynet             # be reachable by Caddy as "zenmotion-frontend"
    # No host ports. Caddy connects over caddynet.

volumes:
  backend_data:

networks:
  zenmotion_internal:
    driver: bridge
  caddynet:
    external: true
    # Set CADDY_NETWORK to the network your Caddy container is attached to.
    name: ${CADDY_NETWORK:-agent-os_default}
