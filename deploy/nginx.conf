# ZenMotion frontend (static) + reverse proxy to the backend API.
# Serving both behind one origin removes CORS concerns and makes the
# frontend's same-origin "/api/..." calls work out of the box.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload cap (matches API body limits).
    client_max_body_size 1m;

    # Gzip for text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # --- API + webhooks -> backend container ---
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Static site ---
    # Allows /checkout to resolve checkout.html, etc.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
